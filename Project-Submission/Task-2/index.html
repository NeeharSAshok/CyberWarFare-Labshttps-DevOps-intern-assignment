<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Intern | Task 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2.5rem;
      color: #58a6ff;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 0.5rem;
    }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 1rem;
      background: #238636;
      color: #ffffff;
      border-radius: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Docker Web App</h1>
    <p>Containerized application running on port <strong>8000</strong></p>
    <p>DevOps Internship — Task 2</p>
    <span class="badge">✅ Container Running</span>
  </div>
</body>
</html>
